<wo:PageWrapper title="$pageTitle" width="1200px">
	<h1><wo:str value="$heading" /></h1>

	<p style="font-size: 1.15em; margin: 16px 0">
		<wo:link href="$prevMonthLink" style="text-decoration: none">&larr;</wo:link>
		<strong style="margin: 0 12px"><wo:str value="$monthTitle" /></strong>
		<wo:link href="$nextMonthLink" style="text-decoration: none">&rarr;</wo:link>
		<wo:if condition="$allMode" negate="$true">
			<span style="margin-left: 16px; font-size: 0.8em"><a href="/calendar/">Sjá allt planið &rarr;</a></span>
		</wo:if>
	</p>

	<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; min-width: 900px">
		<wo:repetition list="$dayNames" item="$currentDayName">
			<div style="text-align: center; font-weight: 600; font-size: 0.85em; padding: 6px 2px; background: #14385c; color: #fff; border-radius: 6px 6px 0 0">
				<wo:str value="$currentDayName" />
			</div>
		</wo:repetition>
	</div>

	<wo:repetition list="$weeks" item="$currentWeek">
		<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-top: 2px; min-width: 900px">

			<wo:repetition list="$currentWeek.cells" item="$currentCell">
				<wo:container elementName="div" style="$currentCell.numberStyle"><wo:str value="$currentCell.number" /></wo:container>
			</wo:repetition>

			<wo:repetition list="$currentWeek.bars" item="$currentBar">
				<wo:container elementName="div" style="$currentBar.style" title="$currentBar.tooltip">
					<wo:if condition="$currentBar.linked">
						<wo:link href="$currentBar.href" style="color: #fff"><strong><wo:str value="$currentBar.title" /></strong></wo:link>
					</wo:if>
					<wo:if condition="$currentBar.linked" negate="$true">
						<strong><wo:str value="$currentBar.title" /></strong>
					</wo:if>
					<span style="opacity: 0.75">&middot; <wo:str value="$currentBar.label" /></span>
				</wo:container>
			</wo:repetition>

			<wo:repetition list="$currentWeek.cells" item="$currentCell">
				<wo:container elementName="div" style="$currentCell.contentStyle">
					<wo:repetition list="$currentCell.events" item="$currentEvent">
						<wo:container elementName="div" title="$currentEvent.description">
							<div style="background: #fff; border-left: 3px solid #33a02c; border-radius: 4px; padding: 5px 6px; margin-bottom: 4px; font-size: 0.78em; box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1)">
								<wo:if condition="$currentEventHasLink">
									<wo:link href="$currentEventHref"><wo:str value="$currentEvent.title" /></wo:link>
								</wo:if>
								<wo:if condition="$currentEventHasLink" negate="$true">
									<wo:str value="$currentEvent.title" />
								</wo:if>
								<wo:if condition="$currentEvent.person">
									<span style="color: #777">&middot; <wo:str value="$currentEvent.person" /></span>
								</wo:if>
							</div>
						</wo:container>
					</wo:repetition>
				</wo:container>
			</wo:repetition>

		</div>
	</wo:repetition>

	<p style="color: #777; font-size: 0.85em; margin-top: 12px">Haltu músinni yfir viðburði til að sjá nánari lýsingu. Ferðir eru dökkbláar, ferðaviðburðir bláir og fjölskylduviðburðir fjólubláir.</p>
</wo:PageWrapper>
