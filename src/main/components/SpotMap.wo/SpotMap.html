<wo:container elementName="div" id="map" style="$style"></wo:container>
<script>
	const spots = <wo:str value="$spotsJSON" escapeHTML="false" />;

	const map = L.map( 'map' );

	L.tileLayer( 'https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
		maxZoom: 19,
		attribution: '&copy; OpenStreetMap'
	} ).addTo( map );

	const coloredIcon = color => new L.Icon( {
		iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
		shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
		iconSize: [25, 41],
		iconAnchor: [12, 41],
		popupAnchor: [1, -34],
		shadowSize: [41, 41]
	} );

	// Red marker for the place we're staying at, gold for unsorted suggestions
	const homeIcon = coloredIcon( 'red' );
	const suggestionIcon = coloredIcon( 'gold' );

	const markerBySlug = {};

	const markers = spots.map( spot => {
		const options = spot.category === 'Gisting' ? { icon: homeIcon, zIndexOffset: 1000 } : {};

		// Undecided spots are semi-transparent, unsorted suggestions gold
		const kannski = spot.status === 'kannski';
		const tillaga = spot.status === 'tillaga';
		if( kannski ) {
			options.opacity = 0.55;
		}
		if( tillaga ) {
			options.icon = suggestionIcon;
		}

		const statusLabel = kannski ? ' (kannski?)' : tillaga ? ' (tillaga)' : '';
		const image = spot.imageURL ? `<img src="${spot.imageURL}" style="width: 220px; border-radius: 4px; display: block; margin: 4px 0"><br>` : '';

		const marker = L.marker( [spot.lat, spot.lon], options ).addTo( map );
		marker.bindPopup( `
			<strong>${spot.name}</strong>${statusLabel}<br>
			${image}
			<span style="color: #555">${spot.category}</span><br>
			<a href="/spot/${spot.slug}">Nánar</a><br>
			<span style="font-size: 0.85em">Opna í:
				<a href="https://www.google.com/maps?q=${spot.lat},${spot.lon}">Google</a> ·
				<a href="https://maps.apple.com/?ll=${spot.lat},${spot.lon}&q=${encodeURIComponent( spot.name )}">Apple</a> ·
				<a href="https://www.openstreetmap.org/?mlat=${spot.lat}&mlon=${spot.lon}#map=14/${spot.lat}/${spot.lon}">OSM</a>
			</span>
		` );
		markerBySlug[spot.slug] = marker;
		return marker;
	} );

	map.fitBounds( L.featureGroup( markers ).getBounds().pad( 0.08 ) );

	// ?spot=slug focuses the map on that spot and opens its popup
	const focusMarker = markerBySlug[new URLSearchParams( window.location.search ).get( 'spot' )];

	if( focusMarker ) {
		map.setView( focusMarker.getLatLng(), 12 );
		focusMarker.openPopup();
	}

	const routes = <wo:str value="$routesJSON" escapeHTML="false" />;

	// Routes are grouped per trip; on maps spanning several trips a layer control lets you toggle each trip's routes
	const tripGroups = {};

	routes.forEach( route => {
		const groupName = route.tripName || 'Annað';

		if( !tripGroups[groupName] ) {
			tripGroups[groupName] = L.layerGroup().addTo( map );
		}

		fetch( `/route-geo/${route.slug}` )
			.then( response => response.json() )
			.then( doc => {
				L.geoJSON( doc.geometry, { style: { color: route.color, weight: 4, opacity: 0.7, dashArray: route.dashed ? '8 8' : null } } )
					.bindPopup( `
						<strong>${route.name}</strong><br>
						<span style="color: #555">${doc.distanceKm} km</span><br>
						<a href="/route/${route.slug}">Nánar</a>
					` )
					.addTo( tripGroups[groupName] );
			} );
	} );

	if( Object.keys( tripGroups ).length > 1 ) {
		L.control.layers( null, tripGroups, { collapsed: false, position: 'topright' } ).addTo( map );
	}
</script>
