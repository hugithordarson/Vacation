<wo:PageWrapper title="$route.name">
	<h1><wo:str value="$route.name" /></h1>
	<p style="color: #555; margin-top: 4px">
		<wo:str value="$route.distanceKm" /> km &middot; ~<wo:str value="$route.durationLabel" /> akstur
		<wo:if condition="$route.statusLabel">
			<span style="color: #b8860b">&middot; <wo:str value="$route.statusLabel" /></span>
		</wo:if>
	</p>
	<p><wo:str value="$route.description" /></p>

	<wo:if condition="$hasStops">
		<h2 style="font-size: 1.1em">Á leiðinni</h2>
		<ol>
			<wo:repetition list="$stops" item="$currentStop">
				<li style="margin: 4px 0">
					<wo:link href="$currentStopLink"><wo:str value="$currentStop.name" /></wo:link>
					<wo:if condition="$currentStop.maybe">
						<span style="color: #b8860b">(kannski?)</span>
					</wo:if>
					<span style="color: #777">&middot; <wo:str value="$currentStop.category" /></span>
				</li>
			</wo:repetition>
		</ol>
	</wo:if>

	<div id="map" style="height: 400px; border-radius: 8px; margin-top: 24px"></div>
	<script>
		const map = L.map( 'map' );

		L.tileLayer( 'https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
			maxZoom: 19,
			attribution: '&copy; OpenStreetMap'
		} ).addTo( map );

		const stops = <wo:str value="$stopsJSON" escapeHTML="false" />;

		stops.forEach( spot => {
			const kannski = spot.status === 'kannski';
			L.marker( [spot.lat, spot.lon], { opacity: kannski ? 0.55 : 1 } )
				.bindPopup( `
					<strong>${spot.name}</strong>${kannski ? ' (kannski?)' : ''}<br>
					<span style="color: #555">${spot.category}</span><br>
					<a href="/spot/${spot.slug}">Nánar</a><br>
					<span style="font-size: 0.85em">Opna í:
						<a href="https://www.google.com/maps?q=${spot.lat},${spot.lon}">Google</a> ·
						<a href="https://maps.apple.com/?ll=${spot.lat},${spot.lon}&q=${encodeURIComponent( spot.name )}">Apple</a> ·
						<a href="https://www.openstreetmap.org/?mlat=${spot.lat}&mlon=${spot.lon}#map=14/${spot.lat}/${spot.lon}">OSM</a>
					</span>
				` )
				.addTo( map );
		} );

		fetch( '/route-geo/<wo:str value="$route.slug" />' )
			.then( response => response.json() )
			.then( doc => {
				const line = L.geoJSON( doc.geometry, { style: { color: '<wo:str value="$route.color" />', weight: 4, dashArray: <wo:str value="$dashArrayJS" escapeHTML="false" /> } } ).addTo( map );
				map.fitBounds( line.getBounds().pad( 0.08 ) );
			} );
	</script>
</wo:PageWrapper>
