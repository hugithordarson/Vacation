<wo:PageWrapper title="$trip.name">
	<h1><wo:str value="$trip.name" /></h1>
	<p style="color: #555; margin-top: 4px"><wo:str value="$trip.spanLabel" /> &middot; <wo:str value="$trip.statusLabel" /></p>
	<p><wo:str value="$trip.description" /></p>

	<wo:SpotMap height="520px" trip="$trip" />
	<p><wo:link href="$mapLink">Skoða kortið í fullri stærð &rarr;</wo:link></p>

	<wo:if condition="$hasRoutes">
		<h2>Bíltúrarnir</h2>
		<ul style="list-style: none; padding: 0">
			<wo:repetition list="$routes" item="$currentRoute">
				<li style="margin: 6px 0">
					<wo:container elementName="span" style="$currentRouteDotStyle">&#9644;</wo:container>
					<wo:link href="$currentRouteLink"><wo:str value="$currentRoute.name" /></wo:link>
					<span style="color: #777">&middot; <wo:str value="$currentRoute.distanceKm" /> km</span>
					<wo:if condition="$currentRoute.statusLabel">
						<span style="color: #b8860b">&middot; <wo:str value="$currentRoute.statusLabel" /></span>
					</wo:if>
				</li>
			</wo:repetition>
		</ul>
	</wo:if>

	<p><wo:link href="$calendarLink">Dagatalið &rarr;</wo:link></p>

	<wo:if condition="$hasAlbumPhotos">
		<h2>Myndaalbúmið</h2>
		<div style="display: flex; gap: 8px; flex-wrap: wrap">
			<wo:repetition list="$albumPreview" item="$currentAlbumPhoto">
				<wo:element elementName="img" src="$currentAlbumPhoto.url" style="height: 140px; width: auto; border-radius: 6px; display: block" />
			</wo:repetition>
		</div>
		<p><wo:link href="$trip.sharedAlbumURL">Allt albúmið í iCloud (<wo:str value="$albumPhotoCount" /> myndir) &rarr;</wo:link></p>
	</wo:if>

	<wo:if condition="$hasImages">
		<h2>Myndirnar</h2>
		<wo:link href="$photosLink" style="display: flex; gap: 8px; flex-wrap: wrap; text-decoration: none">
			<wo:repetition list="$imagePreview" item="$currentImageSpot">
				<wo:img filename="$currentImageSpot.image" style="width: 108px; height: 108px; object-fit: cover; border-radius: 6px; display: block" />
			</wo:repetition>
		</wo:link>
		<p><wo:link href="$photosLink">Allar myndirnar (<wo:str value="$imageCount" />) &rarr;</wo:link></p>
	</wo:if>

	<wo:if condition="$hasGistingImage">
		<h2>Gistingin</h2>
		<wo:link href="$gistingLink" style="display: flex; flex-wrap: wrap; align-items: stretch; text-decoration: none; color: inherit; background: #f0f4f8; border-radius: 10px; overflow: hidden">
			<wo:img filename="$gisting.image" style="width: 300px; height: auto; max-width: 100%; aspect-ratio: 4 / 3; object-fit: cover; display: block; flex: 0 0 auto" />
			<div style="flex: 1 1 260px; min-width: 240px; padding: 14px 18px">
				<strong><wo:str value="$gisting.name" /></strong>
				<p style="color: #555; margin: 8px 0"><wo:str value="$gisting.description" /></p>
				<span style="color: #0b62a4">Nánar um gistinguna &rarr;</span>
			</div>
		</wo:link>
	</wo:if>
</wo:PageWrapper>
