<wo:PageWrapper title="Myndirnar" width="1280px">
	<h1><wo:str value="$heading" /></h1>
	<p>Smelltu á mynd til að sjá staðinn á kortinu.</p>
	<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 18px">
		<wo:repetition list="$spotsWithImages" item="$currentSpot">
			<wo:link href="$currentSpotMapLink" style="position: relative; display: block; text-decoration: none">
				<wo:img filename="$currentSpot.image" style="width: 100%; height: auto; aspect-ratio: 3 / 2; object-fit: cover; border-radius: 10px; display: block" />
				<span style="position: absolute; bottom: 0; left: 0; right: 0; padding: 32px 12px 10px; color: #fff; font-size: 1.05em; border-radius: 0 0 10px 10px; background: linear-gradient(transparent, rgba(0, 0, 0, 0.65))">
					<wo:str value="$currentSpot.name" />
				</span>
			</wo:link>
		</wo:repetition>
	</div>
</wo:PageWrapper>
