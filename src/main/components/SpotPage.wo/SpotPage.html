<wo:PageWrapper title="$spot.name">
	<h1><wo:str value="$spot.name" /></h1>
	<p style="color: #555; margin-top: 4px">
		<wo:str value="$spot.category" />
		<wo:if condition="$spot.maybe">
			<span style="color: #b8860b">&middot; kannski?</span>
		</wo:if>
		<wo:if condition="$spot.suggestion">
			<span style="color: #b8860b">&middot; tillaga — á eftir að flokka</span>
		</wo:if>
	</p>
	<wo:if condition="$spot.image">
		<wo:img filename="$spot.image" style="width: 100%; height: auto; border-radius: 8px; margin-top: 8px" />
	</wo:if>
	<p><wo:str value="$spot.description" /></p>
	<wo:if condition="$spot.url">
		<p><wo:link href="$spot.url">Nánar á vefnum</wo:link></p>
	</wo:if>
	<p style="font-size: 0.9em; color: #777">
		Opna í:
		<wo:link href="$spot.googleMapsURL">Google Maps</wo:link> &middot;
		<wo:link href="$spot.appleMapsURL">Apple Maps</wo:link> &middot;
		<wo:link href="$spot.openStreetMapURL">OpenStreetMap</wo:link>
	</p>
	<div id="map" style="height: 320px; border-radius: 8px; margin-top: 24px"></div>
	<script>
		const map = L.map( 'map' ).setView( [<wo:str value="$spot.lat" />, <wo:str value="$spot.lon" />], 12 );

		L.tileLayer( 'https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
			maxZoom: 19,
			attribution: '&copy; OpenStreetMap'
		} ).addTo( map );

		L.marker( [<wo:str value="$spot.lat" />, <wo:str value="$spot.lon" />] ).addTo( map );
	</script>
</wo:PageWrapper>
