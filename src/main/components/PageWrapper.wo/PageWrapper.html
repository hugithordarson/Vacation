<!doctype html>
<html lang="is">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title><wo:str value="$title" /></title>
		<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

		<style>
			body { margin: 0; font-family: system-ui, sans-serif; color: #222; }

			nav a { color: #cfe0f2; text-decoration: none; }
			nav a:hover { color: #fff; }
			nav .brand { font-weight: bold; }
			nav .brand a { color: #fff; }
			h1 { margin-bottom: 0; }
			a { color: #0b62a4; }
		</style>
	</head>
	<body>
		<nav>
			<span class="brand"><a href="/">Svaka partí</a></span>
			<a href="/map/">Kortið</a>
			<a href="/calendar/">Dagatalið</a>
			<a href="/photos/">Myndirnar</a>
		</nav>
		<wo:container elementName="main" style="$mainStyle">
			<wo:content />
		</wo:container>
	</body>
</html>
